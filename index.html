<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漫才リーダー</title>
<style>
body {
  font-family: sans-serif;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  background: #f5f5f5;
}
textarea {
  width: 100%;
  height: 220px;
  padding: 12px;
  font-size: 16px;
}
button {
  padding: 12px 20px;
  margin: 8px 8px 8px 0;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
}
.line {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>
</head>
<body>

<h1>漫才リーダー</h1>

<textarea id="script">今日は商談でアドバイザーにかなり任せました
でも最後にまとめたくなってしまいました
少し校長先生っぽかったかもしれません</textarea>

<br>

<button onclick="generate()">漫才化</button>
<button onclick="playAll()">全部読む</button>

<div id="output"></div>

<script>
function generate() {
  const text = document.getElementById("script").value;
  const lines = text.split("\n");
  const output = document.getElementById("output");
  output.innerHTML = "";

  lines.forEach((line, i) => {
    const role = i % 2 === 0 ? "ボケ" : "ツッコミ";
    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = "<strong>" + role + "</strong> " + line;
    output.appendChild(div);
  });
}

function playAll() {
  const blocks = document.querySelectorAll(".line");
  let i = 0;

  function speakNext() {
    if (i >= blocks.length) return;
    const utter = new SpeechSynthesisUtterance(blocks[i].innerText);
    utter.lang = "ja-JP";
    utter.onend = () => {
      i++;
      speakNext();
    };
    speechSynthesis.speak(utter);
  }

  speakNext();
}
</script>

</body>
</html>
