<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漫才リーダー</title>
<style>
body {
  font-family: sans-serif;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  background: #f5f5f5;
}
textarea {
  width: 100%;
  height: 220px;
  padding: 12px;
  font-size: 16px;
}
button {
  padding: 12px 20px;
  margin: 8px 8px 8px 0;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
}
.line {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>
</head>
<body>

<h1>漫才リーダー</h1>

<textarea id="script">今日は商談でアドバイザーにかなり任せました
でも最後にまとめたくなってしまいました
少し校長先生っぽかったかもしれません</textarea>

<br>

<button onclick="generate()">漫才化</button>
<button onclick="playAll()">全部読む</button>

<div id="output"></div>

<script>
function generate() {function generate() {
  const text = document.getElementById("script").value;
  const lines = text.split("\n").filter(line => line.trim() !== "");
  const output = document.getElementById("output");
  output.innerHTML = "";

  const roastTemplates = [
    ["本日も校長先生の朝礼が始まりました", "いやまだ会議始まったばかりです"],
    ["まとめたくなる病が発症しました", "その病名まだ医学会通ってません"],
    ["アドバイザーに任せたはずなのに存在感だけ出しました", "一番扱いづらいタイプです"],
    ["また閉会式だけ参加しに来ました", "文化祭の校長か"],
    ["営業という名の自己ツッコミ会場です", "それはもはや独演会です"],
    ["今日も役割を背負ってしまいました", "勝手にランドセル増やさないでください"]
  ];

  lines.forEach((line, i) => {
    const template = roastTemplates[i % roastTemplates.length];

    const div1 = document.createElement("div");
    div1.className = "line";
    div1.innerHTML = "<strong>ボケ</strong> " + template[0];
    output.appendChild(div1);

    const div2 = document.createElement("div");
    div2.className = "line";
    div2.innerHTML = "<strong>ツッコミ</strong> " + template[1];
    output.appendChild(div2);

    const div3 = document.createElement("div");
    div3.className = "line";
    div3.innerHTML = "<strong>本人談</strong> " + line;
    output.appendChild(div3);
  });
}

function playAll() {
  const blocks = document.querySelectorAll(".line");
  let i = 0;

  function speakNext() {
    if (i >= blocks.length) return;
    const utter = new SpeechSynthesisUtterance(blocks[i].innerText);
    utter.lang = "ja-JP";
    utter.onend = () => {
      i++;
      speakNext();
    };
    speechSynthesis.speak(utter);
  }

  speakNext();
}
</script>

</body>
</html>
